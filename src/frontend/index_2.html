<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcendance - Auth Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .status-bar {
            width: 100%;
            max-width: 420px;
            background-color: #2a2a35;
            padding: 14px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #3f3f4e;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #555;
            transition: background 0.3s;
        }
        .status-dot.connected { background-color: #00adb5; }
        .status-text { font-size: 14px; color: #aaa; }
        .status-text span { color: #00adb5; font-weight: 600; }
        
        .status-actions {
            display: flex;
            gap: 8px;
        }
        .btn-nav {
            background-color: #3f3f4e;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-nav:hover {
            background-color: #4f4f62;
            border-color: #00adb5;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #c62828;
            color: #ef9a9a;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-logout:hover { background-color: #c62828; color: #fff; }
        
        .oauth-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .oauth-container a {
            flex: 1;
            text-decoration: none;
        }
        .btn-oauth {
            width: 100%;
            padding: 10px;
            background-color: #3f3f4e;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-oauth:hover {
            background-color: #4f4f62;
            border-color: #00adb5;
        }

        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #00adb5;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 500;
        }
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3f3f4e;
        }
        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #eeeeee;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3f3f4e;
            background-color: #1e1e24;
            color: #fff;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #00adb5; }
        button[type=submit], .btn-action {
            width: 100%;
            padding: 12px;
            background-color: #00adb5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button[type=submit]:hover, .btn-action:hover { background-color: #007a80; }
        
        .btn-danger {
            background-color: #c62828 !important;
        }
        .btn-danger:hover {
            background-color: #b71c1c !important;
        }

        .action-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .action-group button {
            flex: 1;
            min-width: 100px;
        }
        .search-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3f3f4e;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-box input {
            flex: 1;
        }
        .search-box button {
            width: auto;
            padding: 0 15px;
        }
        .display-box {
            background-color: #1e1e24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3f3f4e;
            margin-top: 15px;
            font-size: 14px;
        }
        .display-box p { margin-bottom: 8px; color: #ccc; }
        .display-box p span { color: #fff; font-weight: 600; }
        
        .qr-section {
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            display: inline-block;
            width: 100%;
        }
        .qr-section img {
            max-width: 180px;
            height: auto;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #3f3f4e;
        }
        .leaderboard-table th { color: #00adb5; font-weight: 500; }
        
        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .success { background-color: #2e7d32; color: #fff; }
        .error { background-color: #c62828; color: #fff; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">Vérification...</div>
        </div>
        <div class="status-actions">
            <a href="index.html" class="btn-nav" id="chatBtn" style="display:none">Chat</a>
            <button class="btn-logout" id="logoutBtn" style="display:none" onclick="handleLogout()">Déconnexion</button>
        </div>
    </div>

    <div class="oauth-container" id="oauthLinks">
        <a href="/api/auth/42">
            <button class="btn-oauth">Connexion 42</button>
        </a>
        <a href="/api/auth/google">
            <button class="btn-oauth">Connexion Google</button>
        </a>
    </div>

    <div class="container" id="authFormsContainer">
        <div class="form-section">
            <h2>Créer un compte</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit">S'inscrire</button>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>

        <div class="form-section">
            <h2>Se connecter</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit">Connexion</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>
    </div>

    <div class="container" id="twoFactorContainer" style="display: none;">
        <h2>Validation Double Authentification</h2>
        <form id="twoFactorForm">
            <div class="form-group">
                <label>Code de sécurité (6 chiffres)</label>
                <input type="text" id="2fa-code" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
            </div>
            <button type="submit">Valider</button>
        </form>
        <div id="twoFactorMessage" class="message"></div>
    </div>

    <div class="container" id="statsContainer" style="display: none;">
        <h2>Espace Joueur</h2>
        <div class="action-group">
            <button class="btn-action" onclick="fetchProfile()">Mon Profil</button>
            <button class="btn-action" onclick="fetchLeaderboard()">Classement</button>
            <button class="btn-action" id="btnEnable2FA" onclick="start2FASetup()">Activer 2FA</button>
            <button class="btn-action btn-danger" id="btnDisable2FA" style="display:none;" onclick="disable2FA()">Désactiver 2FA</button>
        </div>

        <div id="setup2FASection" class="display-box" style="display: none;">
            <h3>Configuration de la Double Authentification</h3>
            <p style="margin-top:10px;">Scannez ce QR Code avec Google Authenticator ou une application similaire :</p>
            <div class="qr-section">
                <img id="qrCodeImg" src="" alt="QR Code 2FA">
            </div>
            <form id="verify2FAForm">
                <div class="form-group">
                    <label>Entrez le code à 6 chiffres pour confirmer :</label>
                    <input type="text" id="verify-2fa-code" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
                </div>
                <button type="submit" class="btn-action">Confirmer et Activer</button>
            </form>
            <div id="setup2FAMessage" class="message"></div>
        </div>

        <div class="search-section">
            <form id="searchProfileForm">
                <div class="search-box">
                    <input type="text" id="search-username" placeholder="Rechercher un joueur..." required>
                    <button type="submit" class="btn-action">Voir</button>
                </div>
            </form>
        </div>

        <div id="statsDisplay" class="display-box" style="display: none;"></div>
    </div>

<script>
    const REGISTER_URL     = '/api/register';
    const LOGIN_URL        = '/api/login';
    const LOGOUT_URL       = '/api/logout';
    const PROFILE_URL      = '/api/profile';
    const LEADERBOARD_URL  = '/api/leaderboard';
    const VALIDATE_2FA_URL = '/api/2fa/validate'; // Pour le login
    const SETUP_2FA_URL    = '/api/2fa/setup';    // Demande de QR code
    const VERIFY_2FA_URL   = '/api/2fa/verify';   // Confirmation d'activation
    const DISABLE_2FA_URL  = '/api/2fa/disable';  // Désactivation (À ajouter sur ton back)

    let currentUserData = null;

    function displayMessage(id, text, ok) {
        const el = document.getElementById(id);
        el.innerText = text;
        el.style.display = 'block';
        el.className = 'message ' + (ok ? 'success' : 'error');
    }

    async function checkAuthSession() {
        try {
            const res = await fetch(PROFILE_URL, { method: 'GET', credentials: 'include' });
            
            if (res.ok) {
                const data = await res.json();
                currentUserData = data; // Sauvegarde des données utilisateur locales
                updateUI('CONNECTED', data.username);
                toggle2FAButtons(data.twoFactorEnabled);
            } else if (res.status === 403) {
                updateUI('NEED_2FA');
            } else {
                updateUI('DISCONNECTED');
            }
        } catch (e) {
            console.error("Erreur réseau :", e);
            updateUI('DISCONNECTED');
        }
    }

    // Alterne l'affichage des boutons 2FA dans l'Espace Joueur
    function toggle2FAButtons(isEnabled) {
        const btnEnable = document.getElementById('btnEnable2FA');
        const btnDisable = document.getElementById('btnDisable2FA');
        
        if (isEnabled) {
            btnEnable.style.display = 'none';
            btnDisable.style.display = 'block';
        } else {
            btnEnable.style.display = 'block';
            btnDisable.style.display = 'none';
        }
    }

    function updateUI(state, username = '') {
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const logoutBtn  = document.getElementById('logoutBtn');
        const chatBtn = document.getElementById('chatBtn');
        
        const oauthLinks   = document.getElementById('oauthLinks');
        const authFormsContainer = document.getElementById('authFormsContainer');
        const twoFactorContainer = document.getElementById('twoFactorContainer');
        const statsSection = document.getElementById('statsContainer');
        const setup2FASection = document.getElementById('setup2FASection');

        if (state === 'CONNECTED') {
            dot.className = 'status-dot connected';
            text.innerHTML = 'Connecté : <span>' + username + '</span>';
            logoutBtn.style.display = 'block';
            chatBtn.style.display = 'block';
            statsSection.style.display = 'block';
            
            oauthLinks.style.display = 'none';
            authFormsContainer.style.display = 'none';
            twoFactorContainer.style.display = 'none';
        } 
        else if (state === 'NEED_2FA') {
            dot.className = 'status-dot';
            text.innerHTML = 'Vérification 2FA requise';
            logoutBtn.style.display = 'block';
            chatBtn.style.display = 'none';
            statsSection.style.display = 'none';
            
            oauthLinks.style.display = 'none';
            authFormsContainer.style.display = 'none';
            twoFactorContainer.style.display = 'block';
        } 
        else { // DISCONNECTED
            dot.className = 'status-dot';
            text.innerHTML = 'Non connecté';
            logoutBtn.style.display = 'none';
            chatBtn.style.display = 'none';
            statsSection.style.display = 'none';
            setup2FASection.style.display = 'none';
            
            oauthLinks.style.display = 'flex';
            authFormsContainer.style.display = 'block';
            twoFactorContainer.style.display = 'none';
        }
    }

    // --- PHASE 1 : DEMANDE D'ACTIVATION (RECUPERATION DU QR CODE) ---
    async function start2FASetup() {
        const setupSection = document.getElementById('setup2FASection');
        const qrImg = document.getElementById('qrCodeImg');
        
        try {
            const res = await fetch(SETUP_2FA_URL, { method: 'POST', credentials: 'include' });
            const data = await res.json();
            
            if (res.ok && data.qrCodeDataUrl) {
                qrImg.src = data.qrCodeDataUrl; // Injecte le QR Code Base64 dans l'image
                setupSection.style.display = 'block';
                document.getElementById('setup2FAMessage').style.display = 'none';
            } else {
                alert(data.message || "Impossible de charger le protocole 2FA.");
            }
        } catch (e) {
            console.error(e);
        }
    }

    // --- PHASE 2 : VERIFICATION ET VERROUILLAGE DU 2FA ---
    document.getElementById('verify2FAForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('verify-2fa-code').value;
        
        try {
            const res = await fetch(VERIFY_2FA_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: code })
            });
            const data = await res.json();

            if (res.ok) {
                displayMessage('setup2FAMessage', 'Double authentification activée avec succès !', true);
                document.getElementById('verify2FAForm').reset();
                setTimeout(() => {
                    document.getElementById('setup2FASection').style.display = 'none';
                    checkAuthSession(); // Recharge le profil pour appliquer les changements
                }, 1500);
            } else {
                displayMessage('setup2FAMessage', data.message || 'Code incorrect', false);
            }
        } catch {
            displayMessage('setup2FAMessage', 'Erreur réseau', false);
        }
    });

    // --- PHASE 3 : DESACTIVATION DU 2FA ---
    async function disable2FA() {
        if (!confirm("Êtes-vous sûr de vouloir désactiver la Double Authentification ? Votre compte sera moins sécurisé.")) {
            return;
        }

        try {
            const res = await fetch(DISABLE_2FA_URL, {
                method: 'POST',
                credentials: 'include'
            });
            const data = await res.json();

            if (res.ok) {
                alert("La double authentification a été désactivée.");
                checkAuthSession(); // Met à jour l'UI
            } else {
                alert(data.message || "Erreur lors de la désactivation.");
            }
        } catch (e) {
            console.error(e);
        }
    }

    // --- SOUCHETS CLASSIQUES (LOGIN, LOGOUT, ETC.) ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        try {
            const res  = await fetch(LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (res.ok) {
                document.getElementById('loginForm').reset();
                checkAuthSession();
            } else {
                const data = await res.json();
                displayMessage('loginMessage', data.error || 'Identifiants invalides', false);
            }
        } catch { displayMessage('loginMessage', 'Erreur réseau', false); }
    });

    document.getElementById('twoFactorForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('2fa-code').value;
        try {
            const res = await fetch(VALIDATE_2FA_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: code })
            });
            if (res.ok) {
                document.getElementById('twoFactorForm').reset();
                checkAuthSession();
            } else {
                const data = await res.json();
                displayMessage('twoFactorMessage', data.message || 'Code invalide', false);
            }
        } catch { displayMessage('twoFactorMessage', 'Erreur réseau', false); }
    });

    async function handleLogout() {
        try {
            const res = await fetch(LOGOUT_URL, { method: 'POST', credentials: 'include' });
            if (res.ok) checkAuthSession();
        } catch (e) { console.error(e); }
    }

    async function fetchProfile() {
        const display = document.getElementById('statsDisplay');
        try {
            const res = await fetch(PROFILE_URL, { method: 'GET', credentials: 'include' });
            const data = await res.json();
            if (res.ok) {
                display.style.display = 'block';
                const stats = data.Stats || { numberOfGames: 0, gamesWin: 0, gamesLose: 0, winrate: 0 };
                display.innerHTML = `<h3>Profil de ${data.username}</h3><br><p>2FA Actif: <span>${data.twoFactorEnabled ? 'Oui' : 'Non'}</span></p><p>Email: <span>${data.email}</span></p><br><h4>Statistiques :</h4><p>Parties: <span>${stats.numberOfGames}</span></p><p>Winrate: <span>${stats.winrate}%</span></p>`;
            }
        } catch (e) { console.error(e); }
    }

    async function fetchLeaderboard() {
        const display = document.getElementById('statsDisplay');
        try {
            const res = await fetch(LEADERBOARD_URL, { method: 'GET', credentials: 'include' });
            const data = await res.json();
            if (res.ok) {
                display.style.display = 'block';
                let tableRows = data.map((row, index) => `<tr><td><span>#${index + 1}</span></td><td>${row.user?.username || 'Inconnu'}</td><td>${row.numberOfGames}</td><td>${row.winrate}%</td></tr>`).join('');
                display.innerHTML = `<h3>Top 10</h3><table class="leaderboard-table"><thead><tr><th>Rang</th><th>Joueur</th><th>Parties</th><th>Winrate</th></tr></thead><tbody>${tableRows}</tbody></table>`;
            }
        } catch (e) { console.error(e); }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('reg-email').value;
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        try {
            const res  = await fetch(REGISTER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password })
            });
            if (res.ok) { displayMessage('registerMessage', 'Compte créé !', true); document.getElementById('registerForm').reset(); }
        } catch { displayMessage('registerMessage', 'Erreur réseau', false); }
    });

    checkAuthSession();
</script>
</body>
</html>
