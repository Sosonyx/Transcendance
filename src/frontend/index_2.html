<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcendance - Auth Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .status-bar {
            width: 100%;
            max-width: 420px;
            background-color: #2a2a35;
            padding: 14px 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #3f3f4e;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #555;
            transition: background 0.3s;
        }
        .status-dot.connected { background-color: #00adb5; }
        .status-text { font-size: 14px; color: #aaa; }
        .status-text span { color: #00adb5; font-weight: 600; }
        
        .status-actions {
            display: flex;
            gap: 8px;
        }
        .btn-nav {
            background-color: #3f3f4e;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-nav:hover {
            background-color: #4f4f62;
            border-color: #00adb5;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #c62828;
            color: #ef9a9a;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-logout:hover { background-color: #c62828; color: #fff; }
        
        /* Style ajouté pour harmoniser tes boutons OAuth avec ta charte */
        .oauth-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .oauth-container a {
            flex: 1;
            text-decoration: none;
        }
        .btn-oauth {
            width: 100%;
            padding: 10px;
            background-color: #3f3f4e;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-oauth:hover {
            background-color: #4f4f62;
            border-color: #00adb5;
        }

        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            color: #00adb5;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 500;
        }
        .form-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #3f3f4e;
        }
        .form-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #eeeeee;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #3f3f4e;
            background-color: #1e1e24;
            color: #fff;
            font-size: 15px;
        }
        input:focus { outline: none; border-color: #00adb5; }
        button[type=submit], .btn-action {
            width: 100%;
            padding: 12px;
            background-color: #00adb5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button[type=submit]:hover, .btn-action:hover { background-color: #007a80; }
        
        .action-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #3f3f4e;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-box input {
            flex: 1;
        }
        .search-box button {
            width: auto;
            padding: 0 15px;
        }
        .display-box {
            background-color: #1e1e24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3f3f4e;
            margin-top: 15px;
            font-size: 14px;
        }
        .display-box p { margin-bottom: 8px; color: #ccc; }
        .display-box p span { color: #fff; font-weight: 600; }
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #3f3f4e;
        }
        .leaderboard-table th { color: #00adb5; font-weight: 500; }
        
        .message {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .success { background-color: #2e7d32; color: #fff; }
        .error { background-color: #c62828; color: #fff; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">Non connecté</div>
        </div>
        <div class="status-actions">
            <a href="index.html" class="btn-nav" id="chatBtn" style="display:none">Chat</a>
            <button class="btn-logout" id="logoutBtn" style="display:none" onclick="handleLogout()">Déconnexion</button>
        </div>
    </div>

    <div class="oauth-container" id="oauthLinks">
        <a href="/api/auth/42">
            <button class="btn-oauth">Connexion 42</button>
        </a>
        <a href="/api/auth/google">
            <button class="btn-oauth">Connexion Google</button>
        </a>
    </div>

    <div class="container" id="authFormsContainer">
        <div class="form-section">
            <h2>Créer un compte</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="reg-password" required>
                </div>
                <button type="submit">S'inscrire</button>
            </form>
            <div id="registerMessage" class="message"></div>
        </div>

        <div class="form-section">
            <h2>Se connecter</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <input type="text" id="login-username" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit">Connexion</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>
    </div>

    <div class="container" id="statsContainer" style="display: none;">
        <h2>Espace Joueur</h2>
        <div class="action-group">
            <button class="btn-action" onclick="fetchProfile()">Mon Profil</button>
            <button class="btn-action" onclick="fetchLeaderboard()">Classement</button>
        </div>

        <div class="search-section">
            <form id="searchProfileForm">
                <div class="search-box">
                    <input type="text" id="search-username" placeholder="Rechercher un joueur..." required>
                    <button type="submit" class="btn-action">Voir</button>
                </div>
            </form>
        </div>

        <div id="statsDisplay" class="display-box" style="display: none;"></div>
    </div>

<script>
    const REGISTER_URL    = '/api/register';
    const LOGIN_URL       = '/api/login';
    const LOGOUT_URL      = '/api/logout';
    const PROFILE_URL     = '/api/profile';
    const LEADERBOARD_URL = '/api/leaderboard';

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    function displayMessage(id, text, ok) {
        const el = document.getElementById(id);
        el.innerText = text;
        el.style.display = 'block';
        el.className = 'message ' + (ok ? 'success' : 'error');
    }

    function updateStatusBar() {
        const token    = getCookie('jwt') || localStorage.getItem('token');
        const username = localStorage.getItem('username');
        
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const btn  = document.getElementById('logoutBtn');
        const chatBtn = document.getElementById('chatBtn'); // Récupération du bouton Chat
        const statsSection = document.getElementById('statsContainer');
        const statsDisplay = document.getElementById('statsDisplay');
        
        const oauthLinks   = document.getElementById('oauthLinks');
        const authFormsContainer = document.getElementById('authFormsContainer');

        if (token) {
            dot.classList.add('connected');
            text.innerHTML = username ? 'Connecté en tant que <span>' + username + '</span>' : 'Connecté';
            btn.style.display = 'block';
            chatBtn.style.display = 'block'; // Affiche le bouton Chat
            statsSection.style.display = 'block'; 
            
            oauthLinks.style.display = 'none';
            authFormsContainer.style.display = 'none';
        } else {
            dot.classList.remove('connected');
            text.innerHTML = 'Non connecté';
            btn.style.display = 'none';
            chatBtn.style.display = 'none'; // Masque le bouton Chat
            statsSection.style.display = 'none'; 
            statsDisplay.style.display = 'none';
            statsDisplay.innerHTML = '';
            
            oauthLinks.style.display = 'flex';
            authFormsContainer.style.display = 'block';
        }
    }

    async function handleLogout() {
        try {
            const res = await fetch(LOGOUT_URL, {
                method: 'POST',
                credentials: 'include' 
            });

            if (res.ok) {
                localStorage.removeItem('token');
                localStorage.removeItem('username');
                updateStatusBar();
            } else {
                console.error("Échec de la déconnexion côté serveur.");
            }
        } catch (e) {
            console.error("Erreur réseau :", e);
        }
    }

    async function fetchProfile() {
        const display = document.getElementById('statsDisplay');
        try {
            const res = await fetch(PROFILE_URL, {
                method: 'GET',
                credentials: 'include' 
            });
            const data = await res.json();

            if (res.ok) {
                display.style.display = 'block';
                const stats = data.Stats || { numberOfGames: 0, gamesWin: 0, gamesLose: 0, winrate: 0 };
                
                display.innerHTML = `
                    <h3>Profil de ${data.username}</h3><br>
                    <p>Email: <span>${data.email}</span></p>
                    <p>ID Joueur: <span>${data.id}</span></p><br>
                    <h4>Statistiques de Jeu :</h4>
                    <p>Parties jouées: <span>${stats.numberOfGames}</span></p>
                    <p>Victoires: <span>${stats.gamesWin}</span></p>
                    <p>Défaites: <span>${stats.gamesLose}</span></p>
                    <p>Taux de victoire: <span>${stats.winrate}%</span></p>
                `;
            } else {
                display.style.display = 'block';
                display.innerHTML = `<p style="color:#ef9a9a">Erreur: ${data.error || 'Impossible de charger le profil'}</p>`;
            }
        } catch (e) {
            console.error(e);
            display.style.display = 'block';
            display.innerHTML = `<p style="color:#ef9a9a">Erreur réseau lors de la récupération du profil.</p>`;
        }
    }

    document.getElementById('searchProfileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const targetUsername = document.getElementById('search-username').value.trim();
        const display = document.getElementById('statsDisplay');
        
        try {
            const res = await fetch(`${PROFILE_URL}/${encodeURIComponent(targetUsername)}`, {
                method: 'POST',
                credentials: 'include'
            });
            const data = await res.json();

            if (res.ok) {
                display.style.display = 'block';
                const stats = data.Stats || { numberOfGames: 0, gamesWin: 0, gamesLose: 0, winrate: 0 };
                
                display.innerHTML = `
                    <h3>Profil public de ${data.username}</h3><br>
                    <p>ID Joueur: <span>${data.id}</span></p><br>
                    <h4>Statistiques de Jeu :</h4>
                    <p>Parties jouées: <span>${stats.numberOfGames}</span></p>
                    <p>Victoires: <span>${stats.gamesWin}</span></p>
                    <p>Défaites: <span>${stats.gamesLose}</span></p>
                    <p>Taux de victoire: <span>${stats.winrate}%</span></p>
                `;
                document.getElementById('searchProfileForm').reset();
            } else {
                display.style.display = 'block';
                display.innerHTML = `<p style="color:#ef9a9a">Erreur: ${data.error || 'Joueur introuvable'}</p>`;
            }
        } catch (e) {
            console.error(e);
            display.style.display = 'block';
            display.innerHTML = `<p style="color:#ef9a9a">Erreur réseau lors de la recherche.</p>`;
        }
    });

    async function fetchLeaderboard() {
        const display = document.getElementById('statsDisplay');
        try {
            const res = await fetch(LEADERBOARD_URL, {
                method: 'GET',
                credentials: 'include'
            });
            const data = await res.json();

            if (res.ok) {
                display.style.display = 'block';
                if (data.length === 0) {
                    display.innerHTML = `<h3>Classement Général</h3><p>Aucune statistique enregistrée pour le moment.</p>`;
                    return;
                }

                let tableRows = data.map((row, index) => `
                    <tr>
                        <td><span>#${index + 1}</span></td>
                        <td>${row.user?.username || 'Joueur Inconnu'}</td>
                        <td>${row.numberOfGames}</td>
                        <td>${row.winrate}%</td>
                    </tr>
                `).join('');

                display.innerHTML = `
                    <h3>Classement (Top 10)</h3>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rang</th>
                                <th>Joueur</th>
                                <th>Parties</th>
                                <th>Winrate</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRows}
                        </tbody>
                    </table>
                `;
            } else {
                display.style.display = 'block';
                display.innerHTML = `<p style="color:#ef9a9a">Erreur: ${data.error || 'Impossible de charger le classement'}</p>`;
            }
        } catch (e) {
            console.error(e);
            display.style.display = 'block';
            display.innerHTML = `<p style="color:#ef9a9a">Erreur réseau lors de la récupération du classement.</p>`;
        }
    }

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('reg-email').value;
        const username = document.getElementById('reg-username').value;
        const password = document.getElementById('reg-password').value;
        try {
            const res  = await fetch(REGISTER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password })
            });
            const data = await res.json();
            if (res.ok) {
                displayMessage('registerMessage', 'Compte créé avec succès !', true);
                document.getElementById('registerForm').reset();
            } else {
                displayMessage('registerMessage', data.error || "Erreur lors de l'inscription", false);
            }
        } catch {
            displayMessage('registerMessage', 'Erreur réseau', false);
        }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        try {
            const res  = await fetch(LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.user?.username || username);
                displayMessage('loginMessage', 'Connexion réussie !', true);
                document.getElementById('loginForm').reset();
                updateStatusBar();
            } else {
                displayMessage('loginMessage', data.error || 'Identifiants invalides', false);
            }
        } catch {
            displayMessage('loginMessage', 'Erreur réseau', false);
        }
    });

    function checkOAuthCallback() {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const username = urlParams.get('username');

        if (token && username) {
            localStorage.setItem('token', token);
            localStorage.setItem('username', username);
            window.history.replaceState({}, document.title, window.location.pathname);
            displayMessage('loginMessage', 'Connexion OAuth réussie !', true);
            updateStatusBar();
        }
    }

    checkOAuthCallback();
    updateStatusBar();
</script>
</body>
</html>
