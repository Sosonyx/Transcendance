services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  backend:
    build :
      context : src/
      dockerfile: ../docker_files/Dockerfile.backend
    env_file : 
      - .env
    ports : 
     - 3000:3000
    depends_on :
    - postgres


volumes:
  postgres_data: